<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Tenis</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
body{font-family:'DM Sans';background:#f0f5fb;margin:0}
.app{max-width:480px;margin:auto;padding:16px}
.card{background:#fff;padding:12px;margin:8px 0;border-radius:10px}
.btn{padding:10px;border:none;border-radius:8px;margin-top:6px;width:100%;cursor:pointer}
.btn-primary{background:#1a6fd4;color:#fff}
.btn-danger{background:#d63b3b;color:#fff}
input,textarea,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ccc}
</style>
</head>
<body>
<div class="app">

<h2>Liga Tenis</h2>

<h3>Importar jornada</h3>
<input id="jornadaNombre" placeholder="Nombre jornada">
<textarea id="jornadaText" placeholder="Jugador1, Jugador2"></textarea>
<button class="btn btn-primary" onclick="importMatches(this)">Importar</button>

<h3>Añadir hueco</h3>
<input type="date" id="date">
<input type="time" id="time">
<input placeholder="Pista" id="court">
<button class="btn btn-primary" onclick="addSlot(this)">Añadir hueco</button>

<h3>Reservas</h3>
<div id="slots"></div>

</div>

<script>
const URL='https://yxtjgbbaizojnvzzudmn.supabase.co/rest/v1/liga?id=eq.estado';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4dGpnYmJhaXpvam52enp1ZG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTY0MjksImV4cCI6MjA5Mjg5MjQyOX0.QDXFfajRX9gx3n05N6YDDcFlv5qlGn_SRFKAchEgses';
const H={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};

let S={jornadas:[],slots:[]};

async function load(){
 try{
  const r=await fetch(URL,{headers:H});
  const d=await r.json();
  if(d.length && d[0].data) S=d[0].data;
 }catch(e){console.log('load error',e)}
 render();
}

async function save(){
 try{
  const r=await fetch(URL,{method:'PATCH',headers:H,body:JSON.stringify({data:S})});
  return r.ok;
 }catch(e){console.log('save error',e);return false}
}

async function importMatches(btn){
 const nombre=jornadaNombre.value.trim();
 const text=jornadaText.value.trim();
 if(!nombre||!text) return alert('Faltan datos');
 if(S.jornadas.some(j=>j.nombre===nombre)) return alert('Jornada duplicada');

 let matches=[];
 try{
  matches=text.split('\n').map(l=>{
    const p=l.split(',').map(x=>x.trim());
    if(p.length!==2) throw new Error(l);
    return {p1:p[0],p2:p[1]};
  });
 }catch(e){return alert('Error en línea: '+e.message)}

 btn.disabled=true;btn.textContent='Guardando...';

 const jornada={id:Date.now()+Math.random(),nombre,matches};
 S.jornadas.push(jornada);

 const ok=await save();
 btn.disabled=false;btn.textContent='Importar';

 if(!ok) S.jornadas.pop();
 else{
  jornadaNombre.value='';
  jornadaText.value='';
  render();
 }
}

async function addSlot(btn){
 const d=date.value,t=time.value,c=court.value;
 if(!d||!t||!c) return alert('Faltan datos');

 btn.disabled=true;btn.textContent='Guardando...';

 const slot={id:Date.now()+Math.random(),date:d,time:t,court:c,reservedBy:null,rival:null};
 S.slots.push(slot);

 const ok=await save();
 btn.disabled=false;btn.textContent='Añadir hueco';

 if(!ok) S.slots.pop(); else render();
}

async function reserve(id,btn){
 const s=S.slots.find(x=>x.id===id);
 if(!s||s.reservedBy) return;

 const name=prompt('Tu nombre');
 const rival=prompt('Rival');
 if(!name||!rival) return;

 btn.disabled=true;btn.textContent='Guardando...';

 const backup={...s};
 s.reservedBy=name;
 s.rival=rival;

 const ok=await save();

 if(!ok) Object.assign(s,backup);
 render();
}

async function cancel(id,btn){
 const s=S.slots.find(x=>x.id===id);
 if(!s) return;

 btn.disabled=true;btn.textContent='Cancelando...';

 const backup={...s};
 s.reservedBy=null;
 s.rival=null;

 const ok=await save();

 if(!ok) Object.assign(s,backup);
 render();
}

function render(){
 slots.innerHTML='';

 S.slots.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));

 S.slots.forEach(s=>{
  const d=document.createElement('div');
  d.className='card';

  d.innerHTML=`📅 ${s.date} ⏰ ${s.time} 🎾 ${s.court}`;

  if(s.reservedBy){
    d.innerHTML+=`<br>✅ ${s.reservedBy} vs ${s.rival}`;
    const b=document.createElement('button');
    b.className='btn btn-danger';
    b.textContent='Cancelar';
    b.onclick=()=>cancel(s.id,b);
    d.appendChild(b);
  }else{
    const b=document.createElement('button');
    b.className='btn btn-primary';
    b.textContent='Reservar';
    b.onclick=()=>reserve(s.id,b);
    d.appendChild(b);
  }

  slots.appendChild(d);
 });
}

load();
</script>
</body>
</html>
