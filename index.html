<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Tenis Final</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
body{font-family:'DM Sans';background:#f0f5fb;margin:0}
.app{max-width:480px;margin:auto;padding:16px}
.tabs{display:flex;margin-bottom:10px}
.tab{flex:1;padding:10px;border:none;cursor:pointer}
.tab.active{background:#1a6fd4;color:#fff}
.card{background:#fff;padding:12px;margin:8px 0;border-radius:10px}
.btn{padding:10px;border:none;border-radius:8px;margin-top:6px;width:100%;cursor:pointer}
.btn-primary{background:#1a6fd4;color:#fff}
.btn-danger{background:#d63b3b;color:#fff}
input,textarea,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ccc}
</style>
</head>
<body>
<div class="app">

<div class="tabs">
<button class="tab active" onclick="switchTab('jugador',this)">Jugador</button>
<button class="tab" onclick="switchTab('admin',this)">Organización</button>
</div>

<div id="jugador">
<h3>Entrar como jugador</h3>
<select id="selJugador"></select>
<select id="selRival"></select>
<button class="btn btn-primary" onclick="loginJugador()">Entrar</button>

<div id="panelJugador" style="display:none">
<h3>Huecos disponibles</h3>
<div id="slotsJugador"></div>
</div>
</div>

<div id="admin" style="display:none">
<h3>Importar jornada</h3>
<input id="jornadaNombre">
<textarea id="jornadaText"></textarea>
<button class="btn btn-primary" onclick="importMatches(this)">Importar</button>

<h3>Añadir hueco</h3>
<input type="date" id="date">
<input type="time" id="time">
<input id="court" placeholder="Pista">
<button class="btn btn-primary" onclick="addSlot(this)">Añadir</button>
</div>

</div>

<script>
const URL='https://yxtjgbbaizojnvzzudmn.supabase.co/rest/v1/liga?id=eq.estado';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4dGpnYmJhaXpvam52enp1ZG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTY0MjksImV4cCI6MjA5Mjg5MjQyOX0.QDXFfajRX9gx3n05N6YDDcFlv5qlGn_SRFKAchEgses';
const H={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};

let S={jornadas:[],slots:[]};
let currentPlayer=null,currentRival=null;

function switchTab(t,btn){
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
 btn.classList.add('active');
 jugador.style.display=t==='jugador'?'block':'none';
 admin.style.display=t==='admin'?'block':'none';
}

async function load(){
 try{
  const r=await fetch(URL,{headers:H});
  const d=await r.json();
  if(d.length && d[0].data) S=d[0].data;
 }catch(e){console.log(e)}
 populatePlayers();
 renderJugador();
}

async function save(){
 try{
  const r=await fetch(URL,{method:'PATCH',headers:H,body:JSON.stringify({data:S})});
  return r.ok;
 }catch{return false}
}

function getPlayers(){
 const set=new Set();
 S.jornadas.forEach(j=>j.matches.forEach(m=>{set.add(m.p1);set.add(m.p2)}));
 return [...set];
}

function populatePlayers(){
 selJugador.innerHTML='<option value="">Jugador</option>';
 getPlayers().forEach(p=>{
  const o=document.createElement('option');o.value=p;o.textContent=p;selJugador.appendChild(o);
 });
}

selJugador.onchange=()=>{
 const p=selJugador.value;
 selRival.innerHTML='';
 const rivals=new Set();
 S.jornadas.forEach(j=>j.matches.forEach(m=>{
  if(m.p1===p) rivals.add(m.p2);
  if(m.p2===p) rivals.add(m.p1);
 }));
 rivals.forEach(r=>{
  const o=document.createElement('option');o.value=r;o.textContent=r;selRival.appendChild(o);
 });
}

function loginJugador(){
 currentPlayer=selJugador.value;
 currentRival=selRival.value;
 if(!currentPlayer||!currentRival) return alert('Selecciona');
 panelJugador.style.display='block';
 renderJugador();
}

function renderJugador(){
 slotsJugador.innerHTML='';
 S.slots.forEach(s=>{
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`${s.date} ${s.time} ${s.court}`;

  if(s.reservedBy){
    d.innerHTML+=`<br>Ocupado: ${s.reservedBy}`;
  }else{
    const b=document.createElement('button');b.className='btn btn-primary';b.textContent='Reservar';
    b.onclick=()=>reserve(s.id,b);
    d.appendChild(b);
  }
  slotsJugador.appendChild(d);
 });
}

async function reserve(id,btn){
 const s=S.slots.find(x=>x.id===id);
 if(!s||s.reservedBy) return;

 btn.disabled=true;
 s.reservedBy=currentPlayer;
 s.rival=currentRival;

 const ok=await save();
 if(!ok){s.reservedBy=null;s.rival=null}
 renderJugador();
}

async function importMatches(btn){
 const n=jornadaNombre.value.trim();
 const t=jornadaText.value.trim();
 if(!n||!t) return alert('faltan datos');

 const matches=t.split('\n').map(l=>{
  const p=l.split(',').map(x=>x.trim());
  return {p1:p[0],p2:p[1]};
 });

 btn.disabled=true;
 S.jornadas.push({id:Date.now()+Math.random(),nombre:n,matches});
 const ok=await save();
 btn.disabled=false;
 if(ok){populatePlayers()}else S.jornadas.pop();
}

async function addSlot(btn){
 const d=date.value,t=time.value,c=court.value;
 if(!d||!t||!c) return alert('faltan datos');

 btn.disabled=true;
 const slot={id:Date.now()+Math.random(),date:d,time:t,court:c,reservedBy:null,rival:null};
 S.slots.push(slot);
 const ok=await save();
 btn.disabled=false;
 if(!ok) S.slots.pop();
}

load();
</script>
</body>
</html>
